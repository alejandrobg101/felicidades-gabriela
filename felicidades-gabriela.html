<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Felicidades Gabriela! 🎓</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Jost:wght@400;500;600&family=Saira+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #091229; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const T = {
      navy: "#0E1B3D",
      navyDeep: "#091229",
      gold: "#C9A24B",
      goldBright: "#E8C97A",
      white: "#FFFFFF",
      ink: "#1A2A56",
    };

    const KITS = {
      local: {
        label: "Local · Blanca",
        swatch: "#FFFFFF",
        bodyTop: "#FFFFFF",
        bodyBottom: "#EDEFF5",
        outline: "#C9CFDE",
        trim: "#C9A24B",
        collar: "#1A2A56",
        text: "#C9A24B",
        textStroke: "#1A2A56",
      },
      visitante: {
        label: "Visitante · Verde",
        swatch: "#2E4434",
        bodyTop: "#33503B",
        bodyBottom: "#243528",
        outline: "#1A271E",
        trim: "#E9E2CC",
        collar: "#1A271E",
        text: "#F0EAD6",
        textStroke: "#16201A",
      },
      tercera: {
        label: "Tercera · Rosa",
        swatch: "#A83B66",
        bodyTop: "#B24471",
        bodyBottom: "#8E2F55",
        outline: "#6E2240",
        trim: "#F3ECDD",
        collar: "#6E2240",
        text: "#F6F0E2",
        textStroke: "#5E1C36",
      },
    };

    const PLAYERS = [
      { name: "COURTOIS", num: "1" },
      { name: "CARVAJAL", num: "2" },
      { name: "MILITÃO", num: "3" },
      { name: "ALABA", num: "4" },
      { name: "BELLINGHAM", num: "5" },
      { name: "CAMAVINGA", num: "6" },
      { name: "VINI JR.", num: "7" },
      { name: "VALVERDE", num: "8" },
      { name: "ENDRICK", num: "9" },
      { name: "MBAPPÉ", num: "10" },
      { name: "RODRYGO", num: "11" },
      { name: "TRENT", num: "12" },
      { name: "LUNIN", num: "13" },
      { name: "TCHOUAMÉNI", num: "14" },
      { name: "ARDA GÜLER", num: "15" },
      { name: "GONZALO", num: "16" },
      { name: "ASENCIO", num: "17" },
      { name: "CARRERAS", num: "18" },
      { name: "CEBALLOS", num: "19" },
      { name: "FRAN GARCÍA", num: "20" },
      { name: "BRAHIM", num: "21" },
      { name: "RÜDIGER", num: "22" },
      { name: "MENDY", num: "23" },
      { name: "HUIJSEN", num: "24" },
      { name: "MASTANTUONO", num: "30" },
    ];

    function Confetti({ count = 60 }) {
      const pieces = useMemo(() =>
        Array.from({ length: count }, (_, i) => ({
          id: i,
          left: Math.random() * 100,
          delay: Math.random() * 4,
          dur: 4 + Math.random() * 4,
          size: 6 + Math.random() * 8,
          color: [T.gold, T.goldBright, T.white, "#7FA8FF"][i % 4],
          rot: Math.random() * 360,
        })), [count]);

      return (
        <div style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none" }}>
          <style>{`
            @keyframes fall {
              0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
              100% { transform: translateY(110vh) rotate(720deg); opacity: 0.7; }
            }
          `}</style>
          {pieces.map(p => (
            <div key={p.id} style={{
              position: "absolute", top: "-5vh", left: `${p.left}%`,
              width: p.size, height: p.size * 0.5, background: p.color,
              transform: `rotate(${p.rot}deg)`, borderRadius: 1,
              animation: `fall ${p.dur}s linear ${p.delay}s infinite`,
            }} />
          ))}
        </div>
      );
    }

    function JerseyBack({ name, num, kit }) {
      const k = KITS[kit];
      const displayName = (name || "").toUpperCase();
      const nameSize = displayName.length > 10 ? 16 : displayName.length > 7 ? 21 : 25;
      return (
        <svg viewBox="0 0 320 380" style={{ width: "100%", maxWidth: 340, display: "block" }}>
          <defs>
            <linearGradient id={`shade-${kit}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={k.bodyTop} />
              <stop offset="100%" stopColor={k.bodyBottom} />
            </linearGradient>
          </defs>
          <path d="M68 70 L18 110 L40 168 L82 140 Z" fill={`url(#shade-${kit})`} stroke={k.outline} strokeWidth="2" />
          <path d="M252 70 L302 110 L280 168 L238 140 Z" fill={`url(#shade-${kit})`} stroke={k.outline} strokeWidth="2" />
          <path d="M18 110 L40 168 L52 160 L31 104 Z" fill={k.trim} opacity="0.92" />
          <path d="M302 110 L280 168 L268 160 L289 104 Z" fill={k.trim} opacity="0.92" />
          <path d="M68 70 Q100 50 130 48 Q160 60 190 48 Q220 50 252 70 L238 140 L236 340 Q160 358 84 340 L82 140 Z" fill={`url(#shade-${kit})`} stroke={k.outline} strokeWidth="2" />
          <path d="M130 48 Q160 64 190 48 Q160 76 130 48 Z" fill={k.collar} />
          <path d="M126 50 Q160 70 194 50" fill="none" stroke={k.trim} strokeWidth="3" />
          <path d="M86 332 Q160 349 234 332 L234 340 Q160 358 86 340 Z" fill={k.trim} opacity="0.88" />
          <text x="160" y="120" textAnchor="middle" fontFamily="'Saira Condensed', 'Arial Narrow', sans-serif" fontWeight="700" fontSize={nameSize} letterSpacing="3" fill={k.text} stroke={k.textStroke} strokeWidth="0.6">
            {displayName}
          </text>
          <text x="160" y="248" textAnchor="middle" fontFamily="'Saira Condensed', 'Arial Narrow', sans-serif" fontWeight="700" fontSize="120" fill={k.text} stroke={k.textStroke} strokeWidth="1.5">
            {num || ""}
          </text>
        </svg>
      );
    }

    function GiftBox({ opened, onOpen }) {
      return (
        <div style={{ cursor: opened ? "default" : "pointer" }} onClick={!opened ? onOpen : undefined}>
          <style>{`
            @keyframes wiggle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-3deg)} 75%{transform:rotate(3deg)} }
            @keyframes lidoff { to { transform: translateY(-140px) rotate(-18deg); opacity: 0; } }
            @keyframes risefade { from { transform: translateY(40px) scale(0.6); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
            .gift-closed { animation: wiggle 1.6s ease-in-out infinite; }
            .gift-lid-open { animation: lidoff 0.8s ease forwards; }
            .gift-reveal { animation: risefade 0.9s ease 0.45s both; }
          `}</style>
          <svg viewBox="0 0 240 240" style={{ width: 220, display: "block", margin: "0 auto" }} className={opened ? "" : "gift-closed"}>
            <rect x="50" y="110" width="140" height="100" rx="6" fill={T.white} />
            <rect x="110" y="110" width="20" height="100" fill={T.gold} />
            <g className={opened ? "gift-lid-open" : ""} style={{ transformOrigin: "120px 100px" }}>
              <rect x="40" y="85" width="160" height="30" rx="6" fill="#F2F4FA" />
              <rect x="110" y="85" width="20" height="30" fill={T.gold} />
              <path d="M120 85 Q95 55 110 50 Q122 47 120 78 Q118 47 130 50 Q145 55 120 85 Z" fill={T.goldBright} />
            </g>
          </svg>
          {!opened && (
            <p style={{ textAlign: "center", color: T.goldBright, fontSize: 15, marginTop: 12, letterSpacing: 1 }}>
              Toca el regalo para abrirlo
            </p>
          )}
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState(0);
      const [boxOpened, setBoxOpened] = useState(false);
      const [name, setName] = useState("GABRIELA");
      const [num, setNum] = useState("26");
      const [customMode, setCustomMode] = useState(true);
      const [kit, setKit] = useState("local");
      const [showAll, setShowAll] = useState(false);

      useEffect(() => {
        if (boxOpened) {
          const t = setTimeout(() => setScreen(2), 1700);
          return () => clearTimeout(t);
        }
      }, [boxOpened]);

      const base = {
        minHeight: "100vh",
        background: `radial-gradient(ellipse at 50% -10%, #1B2F63 0%, ${T.navy} 45%, ${T.navyDeep} 100%)`,
        color: T.white,
        fontFamily: "'Jost', system-ui, sans-serif",
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        justifyContent: "center",
        padding: "32px 20px",
        position: "relative",
        overflow: "hidden",
      };

      const goldBtn = {
        background: `linear-gradient(180deg, ${T.goldBright}, ${T.gold})`,
        color: T.navyDeep,
        border: "none",
        borderRadius: 999,
        padding: "14px 34px",
        fontSize: 17,
        fontWeight: 600,
        fontFamily: "'Jost', sans-serif",
        letterSpacing: 0.5,
        cursor: "pointer",
        boxShadow: "0 6px 24px rgba(201,162,75,0.35)",
      };

      const visiblePlayers = showAll ? PLAYERS : PLAYERS.slice(0, 8);

      return (
        <div style={base}>
          <style>{`
            button:focus-visible, input:focus-visible { outline: 3px solid ${T.goldBright}; outline-offset: 2px; }
            @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
            .fade-up { animation: fadeUp 0.7s ease both; }
            .fade-up-2 { animation: fadeUp 0.7s ease 0.25s both; }
            .fade-up-3 { animation: fadeUp 0.7s ease 0.5s both; }
            .chip { background: rgba(255,255,255,0.07); border: 1px solid rgba(201,162,75,0.45); color: #fff; border-radius: 999px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-family: 'Jost', sans-serif; transition: background 0.2s; }
            .chip:hover { background: rgba(201,162,75,0.25); }
            .chip.active { background: ${T.gold}; color: ${T.navyDeep}; font-weight: 600; border-color: ${T.gold}; }
            .kitbtn { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.07); border: 1px solid rgba(201,162,75,0.45); color: #fff; border-radius: 12px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-family: 'Jost', sans-serif; transition: background 0.2s; }
            .kitbtn:hover { background: rgba(201,162,75,0.25); }
            .kitbtn.active { background: rgba(201,162,75,0.95); color: ${T.navyDeep}; font-weight: 600; }
            .kitdot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.7); flex-shrink: 0; }
          `}</style>

          {screen === 0 && (
            <>
              <Confetti />
              <div style={{ textAlign: "center", maxWidth: 560, zIndex: 1 }}>
                <p className="fade-up" style={{ color: T.goldBright, letterSpacing: 4, fontSize: 13, textTransform: "uppercase", marginBottom: 14 }}>
                  Clase de 2026
                </p>
                <h1 className="fade-up" style={{ fontFamily: "'Marcellus', serif", fontSize: "clamp(38px, 9vw, 64px)", margin: "0 0 22px", lineHeight: 1.1 }}>
                  ¡Felicidades,<br />Gabriela!
                </h1>
                <p className="fade-up-2" style={{ fontSize: 17, lineHeight: 1.7, color: "#D8DEF0", marginBottom: 34 }}>
                  Lo lograste. Tantas noches de estudio, tanto esfuerzo, y hoy por fin se celebra.
                  Estoy increíblemente orgulloso de ti y de todo lo que viene para tu futuro.
                  Te quiero mucho, hermanita. 🎓
                </p>
                <button className="fade-up-3" style={goldBtn} onClick={() => setScreen(1)}>
                  Toca para tu sorpresa 🎁
                </button>
              </div>
            </>
          )}

          {screen === 1 && (
            <div style={{ textAlign: "center", zIndex: 1 }}>
              <h2 className="fade-up" style={{ fontFamily: "'Marcellus', serif", fontSize: 28, marginBottom: 30 }}>
                Tienes un regalo esperándote…
              </h2>
              <GiftBox opened={boxOpened} onOpen={() => setBoxOpened(true)} />
              {boxOpened && (
                <div className="gift-reveal">
                  <p style={{ color: T.goldBright, fontSize: 18, marginTop: 20, fontWeight: 500 }}>
                    ¡La nueva camiseta del Real Madrid! ⚪👑
                  </p>
                </div>
              )}
            </div>
          )}

          {screen === 2 && (
            <div style={{ width: "100%", maxWidth: 760, zIndex: 1 }}>
              <div style={{ textAlign: "center", marginBottom: 8 }}>
                <p style={{ color: T.goldBright, letterSpacing: 4, fontSize: 12, textTransform: "uppercase", margin: "0 0 8px" }}>
                  Tu regalo · Camiseta 26/27
                </p>
                <h2 className="fade-up" style={{ fontFamily: "'Marcellus', serif", fontSize: "clamp(24px, 6vw, 34px)", margin: "0 0 6px" }}>
                  Personalízala como quieras
                </h2>
                <p style={{ color: "#B9C2DC", fontSize: 14 }}>
                  Elige la camiseta, un jugador de la plantilla, o pon tu propio nombre y número.
                </p>
              </div>

              <div style={{ display: "flex", flexWrap: "wrap", gap: 28, alignItems: "flex-start", justifyContent: "center", marginTop: 24 }}>
                <div style={{ flex: "1 1 300px", display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
                  <JerseyBack name={name} num={num} kit={kit} />
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
                    {Object.entries(KITS).map(([key, k]) => (
                      <button key={key} className={`kitbtn ${kit === key ? "active" : ""}`} onClick={() => setKit(key)}>
                        <span className="kitdot" style={{ background: k.swatch }} />
                        {k.label}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{ flex: "1 1 300px", maxWidth: 380 }}>
                  <p style={{ fontSize: 13, letterSpacing: 2, textTransform: "uppercase", color: T.goldBright, marginBottom: 10 }}>
                    Plantilla 26/27
                  </p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 10 }}>
                    {visiblePlayers.map(p => (
                      <button key={p.name} className={`chip ${!customMode && name === p.name ? "active" : ""}`}
                        onClick={() => { setName(p.name); setNum(p.num); setCustomMode(false); }}>
                        {p.name} · {p.num}
                      </button>
                    ))}
                    <button className={`chip ${customMode ? "active" : ""}`}
                      onClick={() => { setName("GABRIELA"); setNum("26"); setCustomMode(true); }}>
                      Mi nombre ✨
                    </button>
                  </div>
                  <button onClick={() => setShowAll(!showAll)}
                    style={{ background: "none", border: "none", color: T.goldBright, fontSize: 13, cursor: "pointer", fontFamily: "'Jost', sans-serif", padding: 0, marginBottom: 20, textDecoration: "underline" }}>
                    {showAll ? "Ver menos" : `Ver toda la plantilla (${PLAYERS.length})`}
                  </button>

                  <p style={{ fontSize: 13, letterSpacing: 2, textTransform: "uppercase", color: T.goldBright, marginBottom: 10 }}>
                    O escribe el tuyo
                  </p>
                  <label style={{ display: "block", fontSize: 13, color: "#B9C2DC", marginBottom: 4 }}>Nombre</label>
                  <input value={name} maxLength={14}
                    onChange={e => { setName(e.target.value); setCustomMode(true); }}
                    style={{ width: "100%", padding: "11px 14px", borderRadius: 10, border: "1px solid rgba(201,162,75,0.5)", background: "rgba(255,255,255,0.06)", color: "#fff", fontSize: 16, fontFamily: "'Jost', sans-serif", marginBottom: 14 }} />
                  <label style={{ display: "block", fontSize: 13, color: "#B9C2DC", marginBottom: 4 }}>Número</label>
                  <input value={num} maxLength={2} inputMode="numeric"
                    onChange={e => { setNum(e.target.value.replace(/[^0-9]/g, "")); setCustomMode(true); }}
                    style={{ width: 100, padding: "11px 14px", borderRadius: 10, border: "1px solid rgba(201,162,75,0.5)", background: "rgba(255,255,255,0.06)", color: "#fff", fontSize: 16, fontFamily: "'Jost', sans-serif" }} />

                  <div style={{ marginTop: 26, padding: "16px 18px", borderRadius: 14, border: "1px solid rgba(201,162,75,0.4)", background: "rgba(201,162,75,0.08)" }}>
                    <p style={{ fontSize: 14.5, color: T.goldBright, lineHeight: 1.65 }}>
                      Cuando la tengas lista, mándame un <strong>screenshot</strong>. 📸
                      <br />
                      Como vas para España, pídela así mismo en la tienda del <strong>Bernabéu</strong> — la pago yo. 🤍👑
                      <br />
                      <span style={{ display: "inline-block", marginTop: 8 }}>— Con cariño, tu hermano Alejandro</span>
                    </p>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
